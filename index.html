<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sistema de Tickets</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="app-header">
    <label for="menu-toggle" class="menu-btn" aria-label="Abrir menú">☰</label>
    <h1 class="logo">Sistema de Tickets</h1>
    <nav class="main-nav">
      <a href="#">Panel</a>
      <a href="#">Tickets</a>
      <a href="#">Nuevo</a>
    </nav>
  </header>

  <input type="checkbox" id="menu-toggle" class="menu-toggle" aria-hidden="true">
  <aside class="drawer">
    <nav class="drawer-nav">
      <a href="#">Panel</a>
      <a href="#">Tickets</a>
      <a href="#">Nuevo</a>
    </nav>
  </aside>

  <label for="menu-toggle" class="drawer-backdrop" aria-hidden="true"></label>

  <section class="hero">
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <h2 class="hero-titulo"> Gestiona tus tareas con claridad</h2>
      <p class="hero-subtitulo">Crea, organiza y resuelve tickets en segundos</p>
      <button class="btn-hero" id="btn-hero-crear">Crear un ticket</button>
    </div>
  </section>

  <section class="stats-bar">

    <div class="stat-item">
      <span class="stat-numero" id="stat-total">0</span>
      <span class="stat-label">Total</span>
    </div>

    <div class="stat-item">
      <span class="stat-numero" id="stat-nuevos">0</span>
      <span class="stat-label">Nuevos</span>
    </div>

    <div class="stat-item">
      <span class="stat-numero" id="stat-curso">0</span>
      <span class="stat-label">En Curso</span>
    </div>

    <div class="stat-item">
      <span class="stat-numero" id="stat-resueltos">0</span>
      <span class="stat-label">Resuelto</span>
    </div>

  </section>

  <main>
        
    <section class="form-section">
      
      <div class="filtros">
        <button class="filtro-btn activo" data-filtro="todos">Todos</button>
        <button class="filtro-btn" data-filtro="Nuevo">Nuevos</button>
        <button class="filtro-btn" data-filtro="En Curso">En curso</button>
        <button class="filtro-btn" data-filtro="Urgente">Urgentes</button>
        <button class="filtro-btn" data-filtro="Resuelto">Resuelto</button>
      </div>
      

      <div class="barra-estado">
        <p id="msg-exito" style="display: none; color: #0F6E56; background: #D1F2E6; padding: 8px 12px; border-radius: 6px;font-size: 0.88rem;margin-top: 4px;" ></p>
        <p>Tickets registrados: <span id="contador">0</span></p>

        <button type="button" id="btn-limpiar" class="btn-secundario">
          Limpiar tarjetas
        </button>
      </div>
    </section>

    <section class="tickets-section">
      <h2>Mis tickets</h2>
      <div class="ticket-list" id="panel-tickets">
        
      </div>
    </section>
  </main>

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-titulo" id="modal-titulo">Nuevo Ticket</h2>
        <button class="modal-cerrar" id="btn-modal-cerrar">X</button>
      </div>
      <form id="form-ticket" class="modal-form" novalidate>
        <p id="msg-error" class="msg msg--error" style="display: none;"></p>

        <div class="campo">
          <label for="input-titulo" class="campo-label" >Título <span class="requerido">*</span> </label>
          <input type="text" id="input-titulo" class="campo-input">
        </div>

        <div class="campo">
          <label for="input-descripcion" class="campo-label">Descripción</label>
          <textarea id="input-descripcion" rows="3" class="campo-input"></textarea>
        </div>
        
        <div class="campos-fila">
          <div class="campo">
            <label for="input-prioridad" class="campo-label">Prioridad</label>
            <select id="input-prioridad" class="campo-input">
              <option value="Baja">Baja</option>
              <option value="Media">Media</option>
              <option value="Alta">Alta</option>
            </select>
          </div>
          <div class="campo">
            <label for="input-estado" class="campo-label">Estado</label>
            <select id="input-estado" class="campo-input">
              <option value="Nuevo">Nuevo</option>
              <option value="En Curso">En Curso</option>
              <option value="Urgente">Urgente</option>
              <option value="Resuelto">Resuelto</option>
            </select>
          </div>
        </div>
        
        <div class="modal-footer">
          <button type="button" class="btn-cancelar" id="btn-cancelar-modal">Cancelar</button>
          <button type="submit" class="btn-guardar" id="btn-crear">Crear ticket</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast" id="toast" role="alert" aria-live="polite"></div>
  <script src="app.js" defer></script>
</body>
</html>
